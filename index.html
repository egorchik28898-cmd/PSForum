<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PS FORUM | Polygon Strike — Полная синхронизация</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0F;
      font-family: 'Inter', 'Roboto', sans-serif;
      color: #FFFFFF;
      line-height: 1.5;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(0deg, rgba(138,43,226,0.03) 1px, transparent 1px, transparent 40px), repeating-linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 40px);
      pointer-events: none;
      z-index: 0;
    }
    .app { max-width: 1280px; margin: 0 auto; padding: 0 24px 40px; position: relative; z-index: 2; }
    
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .topic-card, .post-card {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeSlideUp 0.3s ease backwards;
    }
    .topic-card:hover, .post-card:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: #8A2BE2;
      box-shadow: 0 8px 25px rgba(138,43,226,0.2);
    }
    .filter-chip, .nav-btn, .create-btn, .back-btn, .action-icon {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .filter-chip:hover, .nav-btn:hover { transform: scale(1.05); background: #2e2a4e; color: white; box-shadow: 0 0 12px rgba(138,43,226,0.4); }
    .filter-chip.active, .nav-btn.active { background: #8A2BE2; color: white; box-shadow: 0 0 15px rgba(138,43,226,0.6); }
    .create-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px #8A2BE2; }
    .action-icon:hover { transform: scale(1.08); color: #8A2BE2; }
    .delete-topic-btn { background: #FF3B3B20; border: 1px solid #FF3B3B; color: #FF3B3B; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; margin-left: 12px; }
    .delete-topic-btn:hover { transform: scale(1.05); background: #FF3B3B40; }
    
    .header {
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1F1F2E;
      padding: 16px 0;
      margin-bottom: 32px;
      z-index: 100;
    }
    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8A2BE2, #00E5FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-links { display: flex; gap: 8px; background: #111118; padding: 4px; border-radius: 60px; border: 1px solid #1F1F2E; }
    .nav-btn { background: transparent; border: none; color: #9CA3AF; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
    .profile-mini {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111118;
      padding: 6px 16px 6px 10px;
      border-radius: 60px;
      border: 1px solid #2a2350;
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-badge { background: #FF3B3B; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 20px; margin-left: 6px; }
    .verified-badge { color: #00E5FF; margin-left: 4px; font-size: 0.9rem; }
    .logout-btn { background: #2a2350; border: none; color: #FF3B3B; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; margin-left: 8px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; }
    .create-btn {
      background: linear-gradient(135deg, #8A2BE2, #6b21cc);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', monospace;
    }
    .filter-group { display: flex; gap: 8px; background: #111118; padding: 5px; border-radius: 48px; border: 1px solid #1F1F2E; }
    .filter-chip { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; color: #9CA3AF; cursor: pointer; }
    .section-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .topics-grid { display: flex; flex-direction: column; gap: 12px; }
    .topic-card {
      background: #111118;
      border: 1px solid #1F1F2E;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .topic-title { font-family: 'Orbitron', monospace; font-weight: 600; margin-bottom: 6px; }
    .topic-meta { display: flex; gap: 20px; font-size: 0.7rem; color: #9CA3AF; align-items: center; flex-wrap: wrap; }
    .back-btn {
      background: #111118;
      border: 1px solid #2a2350;
      padding: 8px 20px;
      border-radius: 10px;
      color: #ccc;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .post-card {
      background: #111118;
      border: 1px solid #1F1F2E;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      animation: slideInRight 0.3s ease backwards;
    }
    .post-card.pinned { border: 2px solid #FFD966; background: #1a1a2a; }
    .poly-avatar {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
    }
    .poly-avatar:hover { transform: rotate(5deg) scale(1.08); filter: drop-shadow(0 0 8px currentColor); }
    .post-content { flex: 1; }
    .post-author { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .username { font-weight: 700; font-family: 'Orbitron', monospace; }
    .role-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 40px; background: #1f1b36; }
    .post-actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .action-icon {
      background: none;
      border: none;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .admin-action { background: #2a2350; border-radius: 20px; }
    .reply-area {
      background: #111118;
      border-radius: 16px;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-top: 12px;
      border: 1px solid transparent;
    }
    .reply-area.open { max-height: 280px; padding: 20px; border-color: #8A2BE2; }
    .reply-text { width: 100%; background: #0A0A0F; border: 1px solid #2a2350; border-radius: 12px; padding: 12px; color: white; }
    .send-btn { background: #8A2BE2; border: none; padding: 10px 24px; border-radius: 10px; color: white; margin-top: 12px; cursor: pointer; }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-card {
      background: #111118;
      border: 1px solid #8A2BE2;
      border-radius: 28px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      animation: fadeSlideUp 0.3s ease;
    }
    .toast-container { position: fixed; top: 90px; right: 24px; z-index: 1100; display: flex; flex-direction: column; gap: 12px; }
    .toast { background: #111118; border-left: 4px solid #39FF14; padding: 12px 20px; border-radius: 12px; animation: slideInRight 0.3s ease; }
    .hidden-view { display: none; }
    .rules-grid { display: flex; flex-direction: column; gap: 16px; }
    .rule-card { background: #111118; border: 1px solid #1F1F2E; border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; }
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .auth-container {
      background: #111118;
      border: 1px solid #8A2BE2;
      border-radius: 32px;
      padding: 40px;
      width: 90%;
      max-width: 450px;
      animation: fadeSlideUp 0.4s ease;
    }
    .auth-container input {
      width: 100%;
      background: #0A0A0F;
      border: 1px solid #2a2350;
      border-radius: 12px;
      padding: 14px 16px;
      color: white;
      margin-bottom: 16px;
    }
    .auth-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .auth-buttons button { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
    .auth-buttons button:first-child { background: #8A2BE2; color: white; }
    .auth-buttons button:last-child { background: #2a2350; color: white; }
    .error-msg { color: #FF3B3B; font-size: 0.8rem; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-content">
      <div class="logo"><h1>◢ PS FORUM</h1><p>POLYGON STRIKE // ПОЛНАЯ СИНХРОНИЗАЦИЯ</p></div>
      <div class="nav-links" id="navLinks"></div>
      <div class="profile-mini" id="profileMiniBtn">
        <div id="miniAvatar" style="width:32px;height:32px;clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 75%,75% 100%,25% 100%,0% 75%,0% 25%);"></div>
        <span id="miniNick"></span>
      </div>
    </div>
  </div>

  <div id="mainView"><div class="toolbar"><button class="create-btn" id="createTopicBtn">✨ + Создать тему</button><div class="filter-group" id="filterGroup"></div></div><div class="section-nav" id="sectionNav"></div><div id="topicsList" class="topics-grid"></div></div>
  <div id="threadView" class="hidden-view"><button class="back-btn" id="closeThreadBtn">← Назад к темам</button><h2 id="threadTitle"></h2><div id="postsList"></div><div class="reply-container"><button class="reply-trigger" id="openReplyBtn" style="background:#2a2350;border:none;padding:10px 24px;border-radius:10px;color:white;cursor:pointer;">💬 Ответить</button><div class="reply-area" id="replyArea"><textarea class="reply-text" rows="2" placeholder="Напишите сообщение..."></textarea><button class="send-btn" id="sendMessageBtn">📩 Отправить</button></div></div></div>
  <div id="rulesView" class="hidden-view"><button class="back-btn" id="closeRulesBtn">← Назад</button><h2>📜 Правила</h2><div class="rules-grid" id="rulesGrid"></div></div>

  <div class="modal-overlay" id="createTopicModal"><div class="modal-card"><h3>✨ Создание темы</h3><input type="text" id="newTopicTitle" placeholder="Название темы"><select id="newTopicSectionSelect"></select><textarea id="newTopicContent" placeholder="Текст сообщения..."></textarea><div class="modal-buttons"><button id="cancelTopicBtn" style="background:#2a2350;">Отмена</button><button id="submitTopicBtn" style="background:#8A2BE2;">Создать</button></div></div></div>
  <div class="modal-overlay" id="profileModal"><div class="modal-card" id="profileCardContent"></div></div>
  <div class="modal-overlay" id="verifyModal"><div class="modal-card"><h3>✔ Получение галочки</h3><input type="file" id="verifyVideo" accept="video/*"><textarea id="verifyDescription" placeholder="Описание"></textarea><div class="modal-buttons"><button id="cancelVerifyBtn">Отмена</button><button id="submitVerifyBtn">Отправить</button></div></div></div>
  <div class="modal-overlay" id="reportModal"><div class="modal-card"><h3>🚨 Жалоба</h3><textarea id="reportReason" placeholder="Причина..." rows="3"></textarea><div class="modal-buttons"><button id="cancelReportBtn">Отмена</button><button id="submitReportBtn">Отправить</button></div></div></div>
  <div class="modal-overlay" id="adminReportsModal"><div class="modal-card" style="max-width:600px;"><h3>📋 Заявки</h3><div id="reportsList"></div><button id="closeReportsBtn">Закрыть</button></div></div>
  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
// ==================== ЕДИНАЯ БАЗА ДАННЫХ ====================
const DB_KEY = 'ps_forum_sync_data';
const ADMIN_NICKNAMES = ["PS Inside", "FremZer666"];
const SESSION_KEY = 'ps_forum_session';

// Глобальное хранилище - ЕДИНОЕ ДЛЯ ВСЕХ
let forumData = {
  users: [],
  topics: [],
  posts: [],
  reports: [],
  verifyRequests: [],
  banned: [],
  muted: [],
  pinned: [],
  likes: []
};

let currentUser = null;
let sections = [
  { id: "guides", name: "🎯 Гайды", icon: "📚" },
  { id: "tactics", name: "💥 Тактики", icon: "⚔️" },
  { id: "help", name: "🛠 Помощь", icon: "🔧" },
  { id: "chat", name: "🗣 Общение", icon: "💬" },
  { id: "news", name: "📰 Новости", icon: "📢" }
];
let currentSection = "guides";
let currentFilter = "new";
let currentTopicId = null;

// ==================== РАБОТА С ДАННЫМИ ====================
function loadData() {
  const saved = localStorage.getItem(DB_KEY);
  if (saved) {
    forumData = JSON.parse(saved);
    console.log("Данные загружены:", forumData.topics.length, "тем,", forumData.posts.length, "сообщений");
  } else {
    // Инициализация с демо-данными
    const admin1 = { id: "admin_1", nickname: "PS Inside", password: btoa("admin123"), role: "moderator", avatarColor: "#FF3B3B", registered: new Date().toLocaleDateString(), verified: true };
    const admin2 = { id: "admin_2", nickname: "FremZer666", password: btoa("admin123"), role: "moderator", avatarColor: "#FF3B3B", registered: new Date().toLocaleDateString(), verified: true };
    const demoUser = { id: "demo_1", nickname: "NeonGhost", password: btoa(""), role: "pro", avatarColor: "#8A2BE2", registered: new Date().toLocaleDateString(), verified: false };
    
    forumData.users = [admin1, admin2, demoUser];
    forumData.topics = [
      { id: 1, title: "🔥 Идеальный прицел: гайд по рейлгану", section: "guides", authorId: demoUser.id, author: "NeonGhost", postsCount: 2, lastActivity: Date.now() },
      { id: 2, title: "💣 Новая тактика на карте 'Разлом'", section: "tactics", authorId: demoUser.id, author: "NeonGhost", postsCount: 1, lastActivity: Date.now() },
      { id: 3, title: "👋 Приветствие от администрации", section: "chat", authorId: admin1.id, author: "PS Inside", postsCount: 1, lastActivity: Date.now() }
    ];
    forumData.posts = [
      { id: 1, topicId: 1, authorId: demoUser.id, author: "NeonGhost", role: "pro", content: "Советую использовать импульсный мод и целиться в голову!", likes: 4, timestamp: Date.now() - 3600000, avatarColor: "#8A2BE2" },
      { id: 2, topicId: 1, authorId: admin1.id, author: "PS Inside", role: "moderator", content: "Отличный гайд! 🔴 Админ одобряет.", likes: 2, timestamp: Date.now() - 3000000, avatarColor: "#FF3B3B" },
      { id: 3, topicId: 3, authorId: admin1.id, author: "PS Inside", role: "moderator", content: "Добро пожаловать на форум! Соблюдайте правила и будьте вежливы.", likes: 5, timestamp: Date.now() - 2000000, avatarColor: "#FF3B3B" }
    ];
    forumData.reports = [];
    forumData.verifyRequests = [];
    forumData.banned = [];
    forumData.muted = [];
    forumData.pinned = [];
    forumData.likes = [];
    saveData();
  }
}

function saveData() {
  localStorage.setItem(DB_KEY, JSON.stringify(forumData));
  console.log("Данные сохранены:", forumData.topics.length, "тем,", forumData.posts.length, "сообщений");
  // Событие для синхронизации между вкладками
  window.dispatchEvent(new Event('storage'));
}

// Синхронизация между вкладками
window.addEventListener('storage', function(e) {
  if (e.key === DB_KEY) {
    loadData();
    if (document.getElementById("mainView").style.display !== "none") {
      renderMain();
    } else if (currentTopicId) {
      renderPosts(currentTopicId);
    }
    showToast("Данные обновлены");
  }
});

// ==================== АУТЕНТИФИКАЦИЯ ====================
function getOrCreateUser(nickname, password, isRegister = false) {
  let user = forumData.users.find(u => u.nickname === nickname);
  if (isRegister) {
    if (user) return { success: false, error: "Пользователь уже существует" };
    const newUser = {
      id: "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6),
      nickname: nickname,
      password: btoa(password),
      role: "player",
      avatarColor: ["#8A2BE2", "#00E5FF", "#FFD966"][Math.floor(Math.random() * 3)],
      registered: new Date().toLocaleDateString(),
      verified: false
    };
    forumData.users.push(newUser);
    saveData();
    return { success: true, user: newUser };
  } else {
    if (user && atob(user.password || '') === password) {
      return { success: true, user: user };
    }
    return { success: false, error: "Неверный ник или пароль" };
  }
}

function isAdmin() { return currentUser && ADMIN_NICKNAMES.includes(currentUser.nickname); }
function isMuted(userId) { return forumData.muted.includes(userId); }
function isBanned(userId) { return forumData.banned.includes(userId); }
function showToast(msg) { const container = document.getElementById("toastContainer"); const toast = document.createElement("div"); toast.className = "toast"; toast.innerHTML = `✨ ${msg}`; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

// ==================== UI ФУНКЦИИ ====================
function renderFilters() {
  const filters = ["new", "popular"];
  const names = { new: "🆕 Новые", popular: "🔥 Популярные" };
  const div = document.getElementById("filterGroup");
  if (!div) return;
  div.innerHTML = filters.map(f => `<button class="filter-chip ${currentFilter === f ? 'active' : ''}" data-filter="${f}">${names[f]}</button>`).join("");
  document.querySelectorAll(".filter-chip").forEach(btn => btn.addEventListener("click", () => { currentFilter = btn.dataset.filter; renderMain(); }));
}

function renderSectionNav() {
  const container = document.getElementById("sectionNav");
  if (!container) return;
  container.innerHTML = sections.map(sec => `<button class="filter-chip ${currentSection === sec.id ? 'active' : ''}" data-section="${sec.id}">${sec.icon} ${sec.name}</button>`).join("");
  document.querySelectorAll("#sectionNav .filter-chip").forEach(btn => btn.addEventListener("click", () => { currentSection = btn.dataset.section; renderMain(); renderSectionNav(); }));
}

function renderMain() {
  document.getElementById("mainView").style.display = "block";
  document.getElementById("threadView").classList.add("hidden-view");
  document.getElementById("rulesView").classList.add("hidden-view");
  
  let filtered = forumData.topics.filter(t => t.section === currentSection);
  if (currentFilter === "popular") filtered.sort((a, b) => b.postsCount - a.postsCount);
  else filtered.sort((a, b) => b.lastActivity - a.lastActivity);
  
  const container = document.getElementById("topicsList");
  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#9CA3AF;">📭 В этом разделе пока нет тем. Создай первую!</div>`;
  } else {
    container.innerHTML = filtered.map((t, i) => {
      const canDeleteTopic = isAdmin() || t.authorId === currentUser.id;
      return `<div class="topic-card" style="animation-delay:${i * 0.03}s" data-topic-id="${t.id}">
        <div style="flex:1">
          <div class="topic-title">${escapeHtml(t.title)}</div>
          <div class="topic-meta">
            <span>👤 ${escapeHtml(t.author)}</span>
            <span>💬 ${t.postsCount}</span>
            ${canDeleteTopic ? `<button class="delete-topic-btn" data-topic-id="${t.id}" data-topic-title="${escapeHtml(t.title)}">🗑 Удалить тему</button>` : ''}
          </div>
        </div>
        <div>➡️</div>
      </div>`;
    }).join("");
    
    document.querySelectorAll(".topic-card").forEach(card => {
      card.addEventListener("click", (e) => {
        if (e.target.classList.contains('delete-topic-btn')) return;
        openThread(parseInt(card.dataset.topicId));
      });
    });
    document.querySelectorAll(".delete-topic-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const topicId = parseInt(btn.dataset.topicId);
        const topicTitle = btn.dataset.topicTitle;
        if (confirm(`Удалить тему "${topicTitle}" и все ${forumData.posts.filter(p => p.topicId === topicId).length} сообщений?`)) {
          forumData.topics = forumData.topics.filter(t => t.id !== topicId);
          forumData.posts = forumData.posts.filter(p => p.topicId !== topicId);
          saveData();
          renderMain();
          showToast(`Тема "${topicTitle}" удалена`);
        }
      });
    });
  }
  updateMiniProfile();
  renderFilters();
  renderSectionNav();
}

function openThread(topicId) {
  if (isBanned(currentUser.id)) { showToast("❌ Вы забанены!"); return; }
  const topic = forumData.topics.find(t => t.id === topicId);
  if (!topic) return;
  document.getElementById("mainView").style.display = "none";
  document.getElementById("threadView").classList.remove("hidden-view");
  document.getElementById("threadTitle").innerHTML = escapeHtml(topic.title);
  currentTopicId = topicId;
  renderPosts(topicId);
  document.getElementById("replyArea").classList.remove("open");
}

function renderPosts(topicId) {
  let topicPosts = forumData.posts.filter(p => p.topicId === topicId).sort((a, b) => a.timestamp - b.timestamp);
  const pinnedPosts = topicPosts.filter(p => forumData.pinned.includes(p.id));
  const normalPosts = topicPosts.filter(p => !forumData.pinned.includes(p.id));
  topicPosts = [...pinnedPosts, ...normalPosts];
  
  const container = document.getElementById("postsList");
  if (topicPosts.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#9CA3AF;">💬 Пока нет сообщений. Будь первым!</div>`;
    return;
  }
  
  container.innerHTML = topicPosts.map((p, idx) => {
    const user = forumData.users.find(u => u.id === p.authorId);
    const verified = user?.verified;
    const isPostAuthor = p.authorId === currentUser.id;
    const canDelete = isAdmin() || isPostAuthor;
    const isUserMuted = forumData.muted.includes(p.authorId);
    const isLiked = forumData.likes.includes(p.id);
    const isUserAdmin = ADMIN_NICKNAMES.includes(p.author);
    return `<div class="post-card ${forumData.pinned.includes(p.id) ? 'pinned' : ''} ${isUserMuted ? 'muted-user' : ''}" style="animation-delay:${idx * 0.03}s" data-post-id="${p.id}">
      <div class="poly-avatar" style="background:${p.avatarColor};"></div>
      <div class="post-content">
        <div class="post-author">
          <span class="username" style="color:${isUserAdmin ? '#FF3B3B' : '#fff'}">${escapeHtml(p.author)}${verified ? '<span class="verified-badge" title="Подтверждён">✔</span>' : ''}${isUserAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</span>
          <span class="role-badge">${isUserAdmin ? '🔴 Admin' : p.role === 'veteran' ? '🟡 Veteran' : '🔵 Player'}</span>
          <span style="font-size:0.7rem;">${new Date(p.timestamp).toLocaleString()}</span>
          ${forumData.pinned.includes(p.id) ? '<span style="color:#FFD966;">📌 Закреплено</span>' : ''}
        </div>
        <div>${escapeHtml(p.content)}</div>
        <div class="post-actions">
          <button class="action-icon like-btn" data-post-id="${p.id}">${isLiked ? '❤️' : '🤍'} ${p.likes || 0}</button>
          <button class="action-icon quote-btn" data-author="${p.author}" data-content="${escapeHtml(p.content)}">💬 Цитировать</button>
          <button class="action-icon report-btn" data-post-id="${p.id}">🚨 Пожаловаться</button>
          ${canDelete ? `<button class="action-icon delete-btn" data-post-id="${p.id}">🗑 Удалить</button>` : ''}
          ${isAdmin() ? `
            <button class="action-icon admin-action mute-btn" data-user-id="${p.authorId}" data-user-name="${p.author}">🔇 ${forumData.muted.includes(p.authorId) ? 'Размут' : 'Мут'}</button>
            <button class="action-icon admin-action ban-btn" data-user-id="${p.authorId}">🔴 Бан</button>
            <button class="action-icon admin-action verify-grant-btn" data-user-id="${p.authorId}">${verified ? '❌ Забрать' : '✔ Выдать'}</button>
            <button class="action-icon admin-action pin-btn" data-post-id="${p.id}">${forumData.pinned.includes(p.id) ? '📌 Открепить' : '📌 Закрепить'}</button>
          ` : ''}
        </div>
      </div>
    </div>`;
  }).join("");
  
  attachPostEventListeners(topicId);
}

function attachPostEventListeners(topicId) {
  document.querySelectorAll(".like-btn").forEach(btn => btn.addEventListener("click", (e) => {
    const pid = parseInt(btn.dataset.postId);
    const post = forumData.posts.find(p => p.id === pid);
    if (post) {
      if (forumData.likes.includes(pid)) {
        forumData.likes = forumData.likes.filter(id => id !== pid);
        post.likes--;
      } else {
        forumData.likes.push(pid);
        post.likes++;
      }
      saveData();
      renderPosts(topicId);
    }
    e.stopPropagation();
  }));
  
  document.querySelectorAll(".quote-btn").forEach(btn => btn.addEventListener("click", () => {
    const textarea = document.querySelector("#replyArea .reply-text");
    if (textarea) {
      textarea.value = `> ${btn.dataset.author}: ${btn.dataset.content}\n\n`;
      document.getElementById("replyArea").classList.add("open");
      textarea.focus();
    }
  }));
  
  document.querySelectorAll(".delete-btn").forEach(btn => btn.addEventListener("click", (e) => {
    const pid = parseInt(btn.dataset.postId);
    const post = forumData.posts.find(p => p.id === pid);
    if (post && (isAdmin() || post.authorId === currentUser.id)) {
      if (confirm("Удалить сообщение?")) {
        forumData.posts = forumData.posts.filter(p => p.id !== pid);
        const topic = forumData.topics.find(t => t.id === topicId);
        if (topic) topic.postsCount--;
        saveData();
        renderPosts(topicId);
        showToast("Сообщение удалено");
      }
    }
    e.stopPropagation();
  }));
  
  document.querySelectorAll(".report-btn").forEach(btn => btn.addEventListener("click", (e) => {
    const postId = parseInt(btn.dataset.postId);
    document.getElementById("reportModal").classList.add("active");
    document.getElementById("submitReportBtn").onclick = () => {
      const reason = document.getElementById("reportReason").value;
      if (reason) {
        forumData.reports.push({ id: Date.now(), postId, reason, reportedBy: currentUser.id });
        saveData();
        showToast("Жалоба отправлена");
        document.getElementById("reportModal").classList.remove("active");
        document.getElementById("reportReason").value = "";
      }
    };
    e.stopPropagation();
  }));
  
  if (isAdmin()) {
    document.querySelectorAll(".mute-btn").forEach(btn => btn.addEventListener("click", (e) => {
      const userId = btn.dataset.userId;
      if (forumData.muted.includes(userId)) forumData.muted = forumData.muted.filter(id => id !== userId);
      else forumData.muted.push(userId);
      saveData();
      renderPosts(topicId);
      showToast(`Пользователь ${btn.dataset.userName} ${forumData.muted.includes(userId) ? 'замучен' : 'размучен'}`);
      e.stopPropagation();
    }));
    document.querySelectorAll(".ban-btn").forEach(btn => btn.addEventListener("click", (e) => {
      const userId = btn.dataset.userId;
      if (confirm("Забанить пользователя?")) { forumData.banned.push(userId); saveData(); showToast("Пользователь забанен"); }
      e.stopPropagation();
    }));
    document.querySelectorAll(".verify-grant-btn").forEach(btn => btn.addEventListener("click", (e) => {
      const userId = btn.dataset.userId;
      const user = forumData.users.find(u => u.id === userId);
      if (user) { user.verified = !user.verified; saveData(); renderPosts(topicId); showToast(`Галочка ${user.verified ? 'выдана' : 'забрана'}`); }
      e.stopPropagation();
    }));
    document.querySelectorAll(".pin-btn").forEach(btn => btn.addEventListener("click", (e) => {
      const postId = parseInt(btn.dataset.postId);
      if (forumData.pinned.includes(postId)) forumData.pinned = forumData.pinned.filter(id => id !== postId);
      else forumData.pinned.push(postId);
      saveData();
      renderPosts(topicId);
      showToast(forumData.pinned.includes(postId) ? "Закреплено" : "Откреплено");
      e.stopPropagation();
    }));
  }
}

function sendMessage() {
  if (isBanned(currentUser.id)) { showToast("❌ Вы забанены!"); return; }
  if (isMuted(currentUser.id)) { showToast("🔇 Вы в муте!"); return; }
  const textarea = document.querySelector("#replyArea .reply-text");
  const content = textarea.value.trim();
  if (!content || !currentTopicId) return;
  
  const newPost = {
    id: Date.now(),
    topicId: currentTopicId,
    authorId: currentUser.id,
    author: currentUser.nickname,
    role: currentUser.role,
    content: content,
    likes: 0,
    timestamp: Date.now(),
    avatarColor: currentUser.avatarColor
  };
  forumData.posts.push(newPost);
  const topic = forumData.topics.find(t => t.id === currentTopicId);
  if (topic) topic.postsCount++;
  saveData();
  renderPosts(currentTopicId);
  textarea.value = "";
  document.getElementById("replyArea").classList.remove("open");
  showToast("Сообщение отправлено!");
}

function openCreateTopicModal() {
  const select = document.getElementById("newTopicSectionSelect");
  select.innerHTML = sections.map(sec => `<option value="${sec.id}">${sec.icon} ${sec.name}</option>`).join("");
  document.getElementById("createTopicModal").classList.add("active");
}

function submitNewTopic() {
  const title = document.getElementById("newTopicTitle").value.trim();
  const sectionId = document.getElementById("newTopicSectionSelect").value;
  const content = document.getElementById("newTopicContent").value.trim();
  if (!title) { showToast("Введите название"); return; }
  
  const newTopic = {
    id: Date.now(),
    title: title,
    section: sectionId,
    authorId: currentUser.id,
    author: currentUser.nickname,
    postsCount: content ? 1 : 0,
    lastActivity: Date.now()
  };
  forumData.topics.push(newTopic);
  if (content) {
    forumData.posts.push({
      id: Date.now(),
      topicId: newTopic.id,
      authorId: currentUser.id,
      author: currentUser.nickname,
      role: currentUser.role,
      content: content,
      likes: 0,
      timestamp: Date.now(),
      avatarColor: currentUser.avatarColor
    });
  }
  saveData();
  document.getElementById("createTopicModal").classList.remove("active");
  renderMain();
  showToast(`Тема "${title}" создана!`);
}

function showProfileModal() {
  const isAdm = isAdmin();
  const verifyRequestsCount = forumData.verifyRequests.filter(r => r.status === "pending").length;
  const content = document.getElementById("profileCardContent");
  content.innerHTML = `<h3>👤 ${escapeHtml(currentUser.nickname)}${currentUser.verified ? '<span class="verified-badge">✔</span>' : ''}${isAdm ? '<span class="admin-badge">ADMIN</span>' : ''}</h3>
    <p>Роль: ${isAdm ? 'Администратор' : 'Игрок'}</p>
    <p>📝 Сообщений: ${forumData.posts.filter(p => p.authorId === currentUser.id).length}</p>
    <p>📅 Регистрация: ${currentUser.registered}</p>
    ${!isAdm && !currentUser.verified ? `<button id="openVerifyBtnProfile" style="background:#8A2BE2;border:none;padding:8px 20px;border-radius:40px;margin-top:12px;">✔ Получить галочку</button>` : ''}
    ${isAdm ? `<button id="adminReportsBtn" style="background:#FF3B3B;border:none;padding:8px 20px;border-radius:40px;margin-top:12px;">📋 Заявки (${verifyRequestsCount})</button>` : ''}
    <button id="closeProfileBtn" style="background:#2a2350;border:none;padding:8px 24px;border-radius:40px;margin-top:16px;">Закрыть</button>`;
  document.getElementById("profileModal").classList.add("active");
  document.getElementById("closeProfileBtn")?.addEventListener("click", () => document.getElementById("profileModal").classList.remove("active"));
  document.getElementById("openVerifyBtnProfile")?.addEventListener("click", () => { document.getElementById("profileModal").classList.remove("active"); document.getElementById("verifyModal").classList.add("active"); });
  document.getElementById("adminReportsBtn")?.addEventListener("click", () => { document.getElementById("profileModal").classList.remove("active"); openAdminReports(); });
}

function openAdminReports() {
  const pendingRequests = forumData.verifyRequests.filter(r => r.status === "pending");
  const reportsList = document.getElementById("reportsList");
  reportsList.innerHTML = pendingRequests.map(req => `<div style="background:#0A0A0F;padding:16px;border-radius:12px;margin-bottom:12px;">
    <p><strong>👤 ${escapeHtml(req.nickname)}</strong></p>
    <p>📝 ${escapeHtml(req.description || "Без описания")}</p>
    ${req.videoData ? `<video controls style="max-width:100%;margin:8px 0;border-radius:8px;"><source src="${req.videoData}" type="video/mp4"></video>` : ''}
    <div><button class="verify-accept" data-req-id="${req.id}" style="background:#39FF14;border:none;padding:6px 16px;border-radius:20px;margin-right:8px;">✔ Принять</button>
    <button class="verify-reject" data-req-id="${req.id}" style="background:#FF3B3B;border:none;padding:6px 16px;border-radius:20px;">❌ Отклонить</button></div>
  </div>`).join("");
  document.querySelectorAll(".verify-accept").forEach(btn => btn.addEventListener("click", () => {
    const reqId = parseInt(btn.dataset.reqId);
    const request = forumData.verifyRequests.find(r => r.id === reqId);
    if (request) {
      request.status = "accepted";
      const user = forumData.users.find(u => u.id === request.userId);
      if (user) user.verified = true;
      saveData();
      openAdminReports();
      showToast(`Галочка выдана ${request.nickname}`);
    }
  }));
  document.querySelectorAll(".verify-reject").forEach(btn => btn.addEventListener("click", () => {
    const reqId = parseInt(btn.dataset.reqId);
    forumData.verifyRequests = forumData.verifyRequests.filter(r => r.id !== reqId);
    saveData();
    openAdminReports();
    showToast("Заявка отклонена");
  }));
  document.getElementById("adminReportsModal").classList.add("active");
}

function submitVerifyRequest() {
  const videoFile = document.getElementById("verifyVideo").files[0];
  const description = document.getElementById("verifyDescription").value;
  if (!videoFile) { showToast("Выберите видео"); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    forumData.verifyRequests.push({
      id: Date.now(),
      userId: currentUser.id,
      nickname: currentUser.nickname,
      videoData: e.target.result,
      description: description,
      status: "pending"
    });
    saveData();
    showToast("Заявка отправлена");
    document.getElementById("verifyModal").classList.remove("active");
    document.getElementById("verifyVideo").value = "";
    document.getElementById("verifyDescription").value = "";
  };
  reader.readAsDataURL(videoFile);
}

function updateMiniProfile() {
  if (!currentUser) return;
  const isAdm = isAdmin();
  document.getElementById("miniNick").innerHTML = `${escapeHtml(currentUser.nickname)}${isAdm ? '<span class="admin-badge">ADMIN</span>' : ''}${currentUser.verified ? '<span class="verified-badge">✔</span>' : ''}<button class="logout-btn" id="logoutBtn">Выйти</button>`;
  document.getElementById("miniAvatar").style.background = currentUser.avatarColor;
  document.getElementById("logoutBtn")?.addEventListener("click", () => { localStorage.removeItem(SESSION_KEY); location.reload(); });
}

function renderNav(activeView) {
  const navDiv = document.getElementById("navLinks");
  navDiv.innerHTML = `<button class="nav-btn ${activeView === 'forum' ? 'active' : ''}" data-view="forum">🏠 Форум</button>
                      <button class="nav-btn ${activeView === 'rules' ? 'active' : ''}" data-view="rules">📜 Правила</button>`;
  document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
    if (btn.dataset.view === "forum") {
      document.getElementById("mainView").style.display = "block";
      document.getElementById("threadView").classList.add("hidden-view");
      document.getElementById("rulesView").classList.add("hidden-view");
      renderMain();
      renderNav("forum");
    } else {
      document.getElementById("mainView").style.display = "none";
      document.getElementById("threadView").classList.add("hidden-view");
      document.getElementById("rulesView").classList.remove("hidden-view");
      document.getElementById("rulesGrid").innerHTML = `<div class="rule-card"><div>🔹 Уважение</div><div>Не оскорбляй других</div></div>
        <div class="rule-card"><div>🔹 Без спама</div><div>Не флуди</div></div>
        <div class="rule-card"><div>🔹 По теме</div><div>Пиши по делу</div></div>
        <div class="rule-card"><div>🔹 Честность</div><div>Не обманывай</div></div>
        <div class="rule-card"><div>🔹 Лёгкость</div><div>Будь адекватным :)</div></div>`;
      renderNav("rules");
    }
  }));
}

// ==================== АУТЕНТИФИКАЦИЯ UI ====================
function showAuthModal() {
  const modal = document.createElement('div');
  modal.className = 'auth-overlay';
  modal.id = 'authModal';
  modal.innerHTML = `<div class="auth-container"><h2>◢ PS FORUM</h2>
    <input type="text" id="authNickname" placeholder="Никнейм">
    <input type="password" id="authPassword" placeholder="Пароль">
    <div id="authError" class="error-msg"></div>
    <div class="auth-buttons"><button id="authLoginBtn">Войти</button><button id="authRegisterBtn">Регистрация</button></div>
    <div class="auth-switch" id="authSwitch" style="text-align:center;margin-top:20px;color:#9CA3AF;cursor:pointer;">Нет аккаунта? <span style="color:#8A2BE2;">Зарегистрироваться</span></div></div>`;
  document.body.appendChild(modal);
  let isLoginMode = true;
  function updateForm() {
    document.getElementById('authLoginBtn').textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
    document.getElementById('authSwitch').innerHTML = isLoginMode ? 'Нет аккаунта? <span style="color:#8A2BE2;">Зарегистрироваться</span>' : 'Уже есть аккаунт? <span style="color:#8A2BE2;">Войти</span>';
  }
  function handleAuth() {
    const nickname = document.getElementById('authNickname').value.trim();
    const password = document.getElementById('authPassword').value;
    const errorDiv = document.getElementById('authError');
    if (!nickname || !password) { errorDiv.textContent = 'Заполните все поля'; return; }
    if (isLoginMode) {
      const result = getOrCreateUser(nickname, password, false);
      if (result.success) {
        currentUser = result.user;
        localStorage.setItem(SESSION_KEY, currentUser.id);
        modal.remove();
        initAppAfterAuth();
      } else errorDiv.textContent = result.error;
    } else {
      const result = getOrCreateUser(nickname, password, true);
      if (result.success) {
        currentUser = result.user;
        localStorage.setItem(SESSION_KEY, currentUser.id);
        modal.remove();
        initAppAfterAuth();
        showToast(`Добро пожаловать, ${currentUser.nickname}!`);
      } else errorDiv.textContent = result.error;
    }
  }
  document.getElementById('authLoginBtn').addEventListener('click', handleAuth);
  document.getElementById('authRegisterBtn').addEventListener('click', () => { isLoginMode = !isLoginMode; updateForm(); document.getElementById('authError').textContent = ''; });
  document.getElementById('authSwitch').addEventListener('click', () => { isLoginMode = !isLoginMode; updateForm(); document.getElementById('authError').textContent = ''; });
}

function checkSession() {
  const sessionId = localStorage.getItem(SESSION_KEY);
  if (sessionId) {
    currentUser = forumData.users.find(u => u.id === sessionId);
  }
  if (!currentUser) showAuthModal();
  else initAppAfterAuth();
}

function initAppAfterAuth() {
  renderMain();
  renderFilters();
  renderNav("forum");
  updateMiniProfile();
  
  document.getElementById("createTopicBtn")?.addEventListener("click", openCreateTopicModal);
  document.getElementById("cancelTopicBtn")?.addEventListener("click", () => document.getElementById("createTopicModal").classList.remove("active"));
  document.getElementById("submitTopicBtn")?.addEventListener("click", submitNewTopic);
  document.getElementById("closeThreadBtn")?.addEventListener("click", () => { document.getElementById("mainView").style.display = "block"; document.getElementById("threadView").classList.add("hidden-view"); renderMain(); });
  document.getElementById("closeRulesBtn")?.addEventListener("click", () => { document.getElementById("mainView").style.display = "block"; document.getElementById("rulesView").classList.add("hidden-view"); renderMain(); });
  document.getElementById("profileMiniBtn")?.addEventListener("click", showProfileModal);
  document.getElementById("openReplyBtn")?.addEventListener("click", () => document.getElementById("replyArea").classList.toggle("open"));
  document.getElementById("sendMessageBtn")?.addEventListener("click", sendMessage);
  document.getElementById("cancelVerifyBtn")?.addEventListener("click", () => document.getElementById("verifyModal").classList.remove("active"));
  document.getElementById("submitVerifyBtn")?.addEventListener("click", submitVerifyRequest);
  document.getElementById("cancelReportBtn")?.addEventListener("click", () => document.getElementById("reportModal").classList.remove("active"));
  document.getElementById("closeReportsBtn")?.addEventListener("click", () => document.getElementById("adminReportsModal").classList.remove("active"));
}

loadData();
checkSession();
</script>
