<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PS FORUM | Polygon Strike — Админ-панель в интерфейсе</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0F;
      font-family: 'Inter', 'Roboto', sans-serif;
      color: #FFFFFF;
      line-height: 1.5;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(0deg, rgba(138,43,226,0.03) 1px, transparent 1px, transparent 40px), repeating-linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 40px);
      pointer-events: none;
      z-index: 0;
    }
    .app { max-width: 1280px; margin: 0 auto; padding: 0 24px 40px; position: relative; z-index: 2; }
    .header {
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1F1F2E;
      padding: 16px 0;
      margin-bottom: 32px;
      z-index: 100;
    }
    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8A2BE2, #00E5FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p { font-size: 0.7rem; color: #9CA3AF; letter-spacing: 2px; }
    .nav-links {
      display: flex;
      gap: 8px;
      background: #111118;
      padding: 4px;
      border-radius: 60px;
      border: 1px solid #1F1F2E;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #9CA3AF;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn.active { background: #8A2BE2; color: white; box-shadow: 0 0 12px rgba(138,43,226,0.5); }
    .nav-btn:hover { scale: 1.05; background: #2a2350; color: white; }
    .profile-mini {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111118;
      padding: 6px 16px 6px 10px;
      border-radius: 60px;
      border: 1px solid #2a2350;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .profile-mini:hover { border-color: #8A2BE2; box-shadow: 0 0 8px #8A2BE280; scale: 1.02; }
    .admin-badge {
      background: #FF3B3B;
      color: white;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 20px;
      margin-left: 6px;
    }
    .verified-badge {
      color: #00E5FF;
      margin-left: 4px;
      font-size: 0.9rem;
      cursor: help;
    }
    .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; }
    .create-btn {
      background: linear-gradient(135deg, #8A2BE2, #6b21cc);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', monospace;
    }
    .filter-group { display: flex; gap: 8px; background: #111118; padding: 5px; border-radius: 48px; border: 1px solid #1F1F2E; }
    .filter-chip { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; color: #9CA3AF; cursor: pointer; transition: 0.2s; }
    .filter-chip.active { background: #8A2BE2; color: white; }
    .topics-grid { display: flex; flex-direction: column; gap: 12px; }
    .topic-card {
      background: #111118;
      border: 1px solid #1F1F2E;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topic-card:hover { border-color: #8A2BE2; transform: translateY(-2px); }
    .topic-title { font-family: 'Orbitron', monospace; font-weight: 600; margin-bottom: 6px; }
    .topic-meta { display: flex; gap: 20px; font-size: 0.7rem; color: #9CA3AF; }
    .back-btn {
      background: #111118;
      border: 1px solid #2a2350;
      padding: 8px 20px;
      border-radius: 10px;
      color: #ccc;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .post-card {
      background: #111118;
      border: 1px solid #1F1F2E;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      transition: all 0.2s;
      position: relative;
    }
    .post-card.pinned {
      border: 2px solid #FFD966;
      background: #1a1a2a;
    }
    .post-card.muted-user { opacity: 0.6; background: #1a0f1a; }
    .post-card.removing { animation: fadeOutScale 0.3s forwards; }
    @keyframes fadeOutScale { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); display: none; } }
    .poly-avatar {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s;
      clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
    }
    .post-content { flex: 1; }
    .post-author { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .username { font-weight: 700; font-family: 'Orbitron', monospace; }
    .role-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 40px; background: #1f1b36; }
    .post-actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .action-icon {
      background: none;
      border: none;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      transition: all 0.1s;
    }
    .action-icon:hover { scale: 1.05; color: #8A2BE2; }
    .admin-action { background: #2a2350; border-radius: 20px; }
    .reply-area {
      background: #111118;
      border-radius: 16px;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-top: 12px;
      border: 1px solid transparent;
    }
    .reply-area.open { max-height: 280px; padding: 20px; border-color: #8A2BE2; }
    .reply-text { width: 100%; background: #0A0A0F; border: 1px solid #2a2350; border-radius: 12px; padding: 12px; color: white; }
    .send-btn { background: #8A2BE2; border: none; padding: 10px 24px; border-radius: 10px; color: white; margin-top: 12px; cursor: pointer; }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-card {
      background: #111118;
      border: 1px solid #8A2BE2;
      border-radius: 28px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
    }
    .modal-card input, .modal-card select, .modal-card textarea {
      width: 100%;
      background: #0A0A0F;
      border: 1px solid #2a2350;
      border-radius: 12px;
      padding: 12px;
      color: white;
      margin-bottom: 16px;
    }
    .toast-container { position: fixed; top: 90px; right: 24px; z-index: 1100; display: flex; flex-direction: column; gap: 12px; }
    .toast { background: #111118; border-left: 4px solid #39FF14; padding: 12px 20px; border-radius: 12px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .hidden-view { display: none; }
    .section-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .report-btn { color: #FF3B3B; }
    .pin-icon { color: #FFD966; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-content">
      <div class="logo"><h1>◢ PS FORUM</h1><p>POLYGON STRIKE // АДМИН-ПАНЕЛЬ</p></div>
      <div class="nav-links" id="navLinks"></div>
      <div class="profile-mini" id="profileMiniBtn">
        <div id="miniAvatar" style="width:32px;height:32px;clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 75%,75% 100%,25% 100%,0% 75%,0% 25%);"></div>
        <span id="miniNick"></span>
        <div class="online-dot"></div>
      </div>
    </div>
  </div>

  <div id="mainView">
    <div class="toolbar">
      <button class="create-btn" id="createTopicBtn">✨ + Создать тему</button>
      <div class="filter-group" id="filterGroup"></div>
    </div>
    <div class="section-nav" id="sectionNav"></div>
    <div id="topicsList" class="topics-grid"></div>
  </div>

  <div id="threadView" class="hidden-view">
    <button class="back-btn" id="closeThreadBtn">← Назад к темам</button>
    <h2 id="threadTitle"></h2>
    <div id="postsList"></div>
    <div class="reply-container" id="replyContainer">
      <button class="reply-trigger" id="openReplyBtn" style="background:#2a2350;border:none;padding:10px 24px;border-radius:10px;color:white;cursor:pointer;">💬 Ответить</button>
      <div class="reply-area" id="replyArea">
        <textarea class="reply-text" rows="2" placeholder="Напишите сообщение..."></textarea>
        <button class="send-btn" id="sendMessageBtn">📩 Отправить</button>
      </div>
    </div>
  </div>

  <div id="rulesView" class="hidden-view">
    <button class="back-btn" id="closeRulesBtn">← Назад</button>
    <h2>📜 Правила комьюнити</h2>
    <div class="rules-grid" id="rulesGrid"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Модалки -->
<div class="modal-overlay" id="createTopicModal"><div class="modal-card"><h3>✨ Создание темы</h3><input type="text" id="newTopicTitle" placeholder="Название"><select id="newTopicSectionSelect"></select><textarea id="newTopicContent" placeholder="Текст сообщения..."></textarea><div class="modal-buttons"><button id="cancelTopicBtn">Отмена</button><button id="submitTopicBtn">Создать</button></div></div></div>
<div class="modal-overlay" id="profileModal"><div class="modal-card" id="profileCardContent"></div></div>
<div class="modal-overlay" id="verifyModal"><div class="modal-card"><h3>✔ Получение галочки</h3><p>Загрузите видео, где вы показываете свой аккаунт в Polygon Strike или говорите свой ник</p><input type="file" id="verifyVideo" accept="video/*"><textarea id="verifyDescription" placeholder="Описание (необязательно)"></textarea><div class="modal-buttons"><button id="cancelVerifyBtn">Отмена</button><button id="submitVerifyBtn">Отправить заявку</button></div></div></div>
<div class="modal-overlay" id="reportModal"><div class="modal-card"><h3>🚨 Пожаловаться</h3><textarea id="reportReason" placeholder="Причина жалобы..." rows="3"></textarea><div class="modal-buttons"><button id="cancelReportBtn">Отмена</button><button id="submitReportBtn">Отправить</button></div></div></div>
<div class="modal-overlay" id="adminReportsModal"><div class="modal-card" style="max-width:600px;"><h3>📋 Заявки на верификацию</h3><div id="reportsList"></div><button id="closeReportsBtn">Закрыть</button></div></div>

<script>
  // ========== АДМИН АККАУНТ ==========
  const ADMIN_NICKNAME = "user_69396677493";
  
  // База данных localStorage
  let currentUser = null;
  let users = [];
  let topics = [];
  let posts = [];
  let reports = []; // жалобы на сообщения { id, postId, reason, reportedBy }
  let verifyRequests = []; // заявки на верификацию { userId, videoData, description }
  let bannedUsers = new Set();
  let mutedUsers = new Set();
  let pinnedPosts = new Set();
  
  const sections = [
    { id: "guides", name: "🎯 Гайды", icon: "📚" },
    { id: "tactics", name: "💥 Тактики", icon: "⚔️" },
    { id: "help", name: "🛠 Помощь", icon: "🔧" },
    { id: "chat", name: "🗣 Общение", icon: "💬" },
    { id: "news", name: "📰 Новости", icon: "📢" }
  ];
  
  let currentSection = "guides";
  let currentFilter = "new";
  let currentTopicId = null;
  let userLikes = new Set();
  
  // Инициализация данных
  function initData() {
    users = JSON.parse(localStorage.getItem("ps_users")) || [];
    topics = JSON.parse(localStorage.getItem("ps_topics")) || [];
    posts = JSON.parse(localStorage.getItem("ps_posts")) || [];
    reports = JSON.parse(localStorage.getItem("ps_reports")) || [];
    verifyRequests = JSON.parse(localStorage.getItem("ps_verify")) || [];
    const banned = JSON.parse(localStorage.getItem("ps_banned")) || [];
    const muted = JSON.parse(localStorage.getItem("ps_muted")) || [];
    const pinned = JSON.parse(localStorage.getItem("ps_pinned")) || [];
    const likes = JSON.parse(localStorage.getItem("ps_likes")) || [];
    
    bannedUsers = new Set(banned);
    mutedUsers = new Set(muted);
    pinnedPosts = new Set(pinned);
    userLikes = new Set(likes);
    
    if (users.length === 0) {
      users = [
        { id: "user_1", nickname: "NeonGhost", role: "pro", avatarColor: "#8A2BE2", registered: "10.03.2025", verified: false },
        { id: "user_2", nickname: "ShadowStrike", role: "player", avatarColor: "#00E5FF", registered: "12.03.2025", verified: false },
        { id: "user_69396677493", nickname: "user_69396677493", role: "moderator", avatarColor: "#FF3B3B", registered: "20.03.2025", verified: true, isAdmin: true }
      ];
    }
    
    if (topics.length === 0) {
      topics = [
        { id: 1, title: "🔥 Идеальный прицел: гайд по рейлгану", section: "guides", authorId: "user_1", author: "NeonGhost", postsCount: 2, lastActivity: Date.now() },
        { id: 2, title: "💣 Новая тактика на карте 'Разлом'", section: "tactics", authorId: "user_2", author: "ShadowStrike", postsCount: 1, lastActivity: Date.now() }
      ];
    }
    
    if (posts.length === 0) {
      posts = [
        { id: 1, topicId: 1, authorId: "user_1", author: "NeonGhost", role: "pro", content: "Советую использовать импульсный мод.", likes: 4, timestamp: Date.now() - 3600000, avatarColor: "#8A2BE2" },
        { id: 2, topicId: 1, authorId: "user_69396677493", author: "user_69396677493", role: "moderator", content: "Отличный гайд! 🔴 Админ одобряет.", likes: 2, timestamp: Date.now() - 3000000, avatarColor: "#FF3B3B" }
      ];
    }
    
    saveAll();
  }
  
  function saveAll() {
    localStorage.setItem("ps_users", JSON.stringify(users));
    localStorage.setItem("ps_topics", JSON.stringify(topics));
    localStorage.setItem("ps_posts", JSON.stringify(posts));
    localStorage.setItem("ps_reports", JSON.stringify(reports));
    localStorage.setItem("ps_verify", JSON.stringify(verifyRequests));
    localStorage.setItem("ps_banned", JSON.stringify([...bannedUsers]));
    localStorage.setItem("ps_muted", JSON.stringify([...mutedUsers]));
    localStorage.setItem("ps_pinned", JSON.stringify([...pinnedPosts]));
    localStorage.setItem("ps_likes", JSON.stringify([...userLikes]));
  }
  
  function getCurrentUser() {
    let userId = localStorage.getItem("ps_current_user");
    let user = users.find(u => u.id === userId);
    if (!user) {
      user = users.find(u => u.nickname === ADMIN_NICKNAME) || users[0];
      if (user) localStorage.setItem("ps_current_user", user.id);
    }
    return user;
  }
  
  function isAdmin() { return currentUser && currentUser.nickname === ADMIN_NICKNAME; }
  function isMuted(userId) { return mutedUsers.has(userId); }
  function isBanned(userId) { return bannedUsers.has(userId); }
  function isVerified(userId) { return users.find(u => u.id === userId)?.verified || false; }
  
  function showToast(msg) {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerHTML = `✨ ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function renderMain() {
    const filtered = topics.filter(t => t.section === currentSection);
    const container = document.getElementById("topicsList");
    container.innerHTML = filtered.map(t => `
      <div class="topic-card" data-topic-id="${t.id}">
        <div><div class="topic-title">${escapeHtml(t.title)}</div><div class="topic-meta"><span>👤 ${escapeHtml(t.author)}</span><span>💬 ${t.postsCount}</span></div></div><div>➡️</div>
      </div>
    `).join("");
    document.querySelectorAll(".topic-card").forEach(card => {
      card.addEventListener("click", () => openThread(parseInt(card.dataset.topicId)));
    });
    updateMiniProfile();
  }
  
  function openThread(topicId) {
    if (isBanned(currentUser.id)) { showToast("❌ Вы забанены!"); return; }
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return;
    document.getElementById("mainView").style.display = "none";
    document.getElementById("threadView").classList.remove("hidden-view");
    document.getElementById("threadTitle").innerHTML = escapeHtml(topic.title);
    currentTopicId = topicId;
    renderPosts(topicId);
  }
  
  function renderPosts(topicId) {
    let topicPosts = posts.filter(p => p.topicId === topicId).sort((a, b) => a.timestamp - b.timestamp);
    const pinned = topicPosts.filter(p => pinnedPosts.has(p.id));
    const normal = topicPosts.filter(p => !pinnedPosts.has(p.id));
    topicPosts = [...pinned, ...normal];
    
    const container = document.getElementById("postsList");
    container.innerHTML = topicPosts.map(p => {
      const user = users.find(u => u.id === p.authorId);
      const verified = user?.verified;
      const isPostAuthor = p.authorId === currentUser.id;
      const canDelete = isAdmin() || isPostAuthor;
      const isUserMuted = isMuted(p.authorId);
      
      return `
        <div class="post-card ${pinnedPosts.has(p.id) ? 'pinned' : ''} ${isUserMuted ? 'muted-user' : ''}" data-post-id="${p.id}" data-author-id="${p.authorId}">
          <div class="poly-avatar" style="background:${p.avatarColor};"></div>
          <div class="post-content">
            <div class="post-author">
              <span class="username" style="color:${p.role === 'moderator' ? '#FF3B3B' : '#fff'}">${escapeHtml(p.author)}${verified ? '<span class="verified-badge" title="Подтверждённый пользователь">✔</span>' : ''}${isAdmin() && p.authorId === currentUser.id ? '<span class="admin-badge">ADMIN</span>' : ''}</span>
              <span class="role-badge">${p.role === 'moderator' ? '🔴 Admin' : p.role === 'veteran' ? '🟡 Veteran' : '🔵 Player'}</span>
              <span style="font-size:0.7rem;">${new Date(p.timestamp).toLocaleString()}</span>
              ${pinnedPosts.has(p.id) ? '<span class="pin-icon">📌 Закреплено</span>' : ''}
            </div>
            <div>${escapeHtml(p.content)}</div>
            <div class="post-actions">
              <button class="action-icon like-btn" data-post-id="${p.id}">${userLikes.has(p.id) ? '❤️' : '🤍'} ${p.likes || 0}</button>
              <button class="action-icon quote-btn" data-author="${p.author}" data-content="${escapeHtml(p.content)}">💬 Цитировать</button>
              <button class="action-icon report-btn" data-post-id="${p.id}">🚨 Пожаловаться</button>
              ${canDelete ? `<button class="action-icon delete-btn" data-post-id="${p.id}">🗑 Удалить</button>` : ''}
              ${isAdmin() ? `
                <button class="action-icon admin-action mute-btn" data-user-id="${p.authorId}" data-user-name="${p.author}">🔇 ${isMuted(p.authorId) ? 'Размут' : 'Мут'}</button>
                <button class="action-icon admin-action ban-btn" data-user-id="${p.authorId}">🔴 Бан</button>
                <button class="action-icon admin-action verify-grant-btn" data-user-id="${p.authorId}">${verified ? '❌ Забрать галочку' : '✔ Выдать галочку'}</button>
                <button class="action-icon admin-action pin-btn" data-post-id="${p.id}">${pinnedPosts.has(p.id) ? '📌 Открепить' : '📌 Закрепить'}</button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }).join("");
    
    attachPostEventListeners(topicId);
  }
  
  function attachPostEventListeners(topicId) {
    document.querySelectorAll(".like-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const pid = parseInt(btn.dataset.postId);
        const post = posts.find(p => p.id === pid);
        if (post) {
          if (userLikes.has(pid)) { userLikes.delete(pid); post.likes--; }
          else { userLikes.add(pid); post.likes++; }
          saveAll();
          renderPosts(topicId);
        }
        e.stopPropagation();
      });
    });
    
    document.querySelectorAll(".quote-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const textarea = document.querySelector("#replyArea .reply-text");
        if (textarea) {
          textarea.value = `> ${btn.dataset.author}: ${btn.dataset.content}\n\n`;
          document.getElementById("replyArea").classList.add("open");
          textarea.focus();
        }
      });
    });
    
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const pid = parseInt(btn.dataset.postId);
        const post = posts.find(p => p.id === pid);
        if (post && (isAdmin() || post.authorId === currentUser.id)) {
          if (confirm("Удалить сообщение?")) {
            const index = posts.findIndex(p => p.id === pid);
            posts.splice(index, 1);
            const topic = topics.find(t => t.id === topicId);
            if (topic) topic.postsCount--;
            saveAll();
            renderPosts(topicId);
            showToast("Сообщение удалено");
          }
        }
        e.stopPropagation();
      });
    });
    
    document.querySelectorAll(".report-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const postId = parseInt(btn.dataset.postId);
        document.getElementById("reportModal").classList.add("active");
        document.getElementById("submitReportBtn").onclick = () => {
          const reason = document.getElementById("reportReason").value;
          if (reason) {
            reports.push({ id: Date.now(), postId, reason, reportedBy: currentUser.id });
            saveAll();
            showToast("Жалоба отправлена админу");
            document.getElementById("reportModal").classList.remove("active");
            document.getElementById("reportReason").value = "";
          }
        };
        e.stopPropagation();
      });
    });
    
    if (isAdmin()) {
      document.querySelectorAll(".mute-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const userId = btn.dataset.userId;
          if (mutedUsers.has(userId)) mutedUsers.delete(userId);
          else mutedUsers.add(userId);
          saveAll();
          renderPosts(topicId);
          showToast(`Пользователь ${btn.dataset.userName} ${mutedUsers.has(userId) ? 'замучен' : 'размучен'}`);
          e.stopPropagation();
        });
      });
      
      document.querySelectorAll(".ban-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const userId = btn.dataset.userId;
          if (confirm("Забанить пользователя?")) {
            bannedUsers.add(userId);
            saveAll();
            showToast("Пользователь забанен");
          }
          e.stopPropagation();
        });
      });
      
      document.querySelectorAll(".verify-grant-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const userId = btn.dataset.userId;
          const user = users.find(u => u.id === userId);
          if (user) {
            user.verified = !user.verified;
            saveAll();
            renderPosts(topicId);
            showToast(`Галочка ${user.verified ? 'выдана' : 'забрана'} для ${user.nickname}`);
          }
          e.stopPropagation();
        });
      });
      
      document.querySelectorAll(".pin-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const postId = parseInt(btn.dataset.postId);
          if (pinnedPosts.has(postId)) pinnedPosts.delete(postId);
          else pinnedPosts.add(postId);
          saveAll();
          renderPosts(topicId);
          showToast(pinnedPosts.has(postId) ? "Сообщение закреплено" : "Сообщение откреплено");
          e.stopPropagation();
        });
      });
    }
  }
  
  function sendMessage() {
    if (isBanned(currentUser.id)) { showToast("❌ Вы забанены!"); return; }
    if (isMuted(currentUser.id)) { showToast("🔇 Вы в муте! Не можете писать."); return; }
    
    const textarea = document.querySelector("#replyArea .reply-text");
    const content = textarea.value.trim();
    if (!content || !currentTopicId) return;
    
    const newPost = {
      id: Date.now(),
      topicId: currentTopicId,
      authorId: currentUser.id,
      author: currentUser.nickname,
      role: currentUser.role,
      content: content,
      likes: 0,
      timestamp: Date.now(),
      avatarColor: currentUser.avatarColor
    };
    posts.push(newPost);
    const topic = topics.find(t => t.id === currentTopicId);
    if (topic) topic.postsCount++;
    saveAll();
    renderPosts(currentTopicId);
    textarea.value = "";
    document.getElementById("replyArea").classList.remove("open");
    showToast("Сообщение отправлено!");
  }
  
  function openVerifyModal() {
    document.getElementById("verifyModal").classList.add("active");
  }
  
  function submitVerifyRequest() {
    const videoFile = document.getElementById("verifyVideo").files[0];
    const description = document.getElementById("verifyDescription").value;
    
    if (!videoFile) {
      showToast("Пожалуйста, выберите видео");
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      verifyRequests.push({
        id: Date.now(),
        userId: currentUser.id,
        nickname: currentUser.nickname,
        videoData: e.target.result,
        description: description,
        status: "pending"
      });
      saveAll();
      showToast("Заявка на верификацию отправлена админу");
      document.getElementById("verifyModal").classList.remove("active");
      document.getElementById("verifyVideo").value = "";
      document.getElementById("verifyDescription").value = "";
    };
    reader.readAsDataURL(videoFile);
  }
  
  function openAdminReports() {
    const pendingRequests = verifyRequests.filter(r => r.status === "pending");
    const reportsList = document.getElementById("reportsList");
    reportsList.innerHTML = pendingRequests.map(req => `
      <div style="background:#0A0A0F;padding:16px;border-radius:12px;margin-bottom:12px;">
        <p><strong>👤 ${escapeHtml(req.nickname)}</strong></p>
        <p>📝 ${escapeHtml(req.description || "Без описания")}</p>
        ${req.videoData ? `<video controls style="max-width:100%;margin:8px 0;border-radius:8px;"><source src="${req.videoData}" type="video/mp4"></video>` : ''}
        <div style="display:flex;gap:12px;margin-top:12px;">
          <button class="verify-accept" data-req-id="${req.id}" style="background:#39FF14;border:none;padding:6px 16px;border-radius:20px;cursor:pointer;">✔ Принять</button>
          <button class="verify-reject" data-req-id="${req.id}" style="background:#FF3B3B;border:none;padding:6px 16px;border-radius:20px;cursor:pointer;">❌ Отклонить</button>
        </div>
      </div>
    `).join("");
    
    document.querySelectorAll(".verify-accept").forEach(btn => {
      btn.addEventListener("click", () => {
        const reqId = parseInt(btn.dataset.reqId);
        const request = verifyRequests.find(r => r.id === reqId);
        if (request) {
          request.status = "accepted";
          const user = users.find(u => u.id === request.userId);
          if (user) user.verified = true;
          saveAll();
          openAdminReports();
          showToast(`Галочка выдана ${request.nickname}`);
        }
      });
    });
    
    document.querySelectorAll(".verify-reject").forEach(btn => {
      btn.addEventListener("click", () => {
        const reqId = parseInt(btn.dataset.reqId);
        const index = verifyRequests.findIndex(r => r.id === reqId);
        if (index !== -1) verifyRequests.splice(index, 1);
        saveAll();
        openAdminReports();
        showToast("Заявка отклонена");
      });
    });
    
    document.getElementById("adminReportsModal").classList.add("active");
  }
  
  function updateMiniProfile() {
    if (!currentUser) return;
    const isAdm = isAdmin();
    document.getElementById("miniNick").innerHTML = `${currentUser.nickname}${isAdm ? '<span class="admin-badge">ADMIN</span>' : ''}${currentUser.verified ? '<span class="verified-badge">✔</span>' : ''}`;
    document.getElementById("miniAvatar").style.background = currentUser.avatarColor;
  }
  
  function showProfileModal() {
    const isAdm = isAdmin();
    const verifyButton = !isAdm && !currentUser.verified ? `<button id="openVerifyBtnProfile" style="background:#8A2BE2;border:none;padding:8px 20px;border-radius:40px;margin-top:12px;cursor:pointer;">✔ Получить галочку</button>` : '';
    const adminReportsButton = isAdm ? `<button id="adminReportsBtn" style="background:#FF3B3B;border:none;padding:8px 20px;border-radius:40px;margin-top:12px;cursor:pointer;">📋 Заявки на верификацию (${verifyRequests.filter(r => r.status === "pending").length})</button>` : '';
    
    const content = document.getElementById("profileCardContent");
    content.innerHTML = `
      <h3>👤 ${escapeHtml(currentUser.nickname)}${currentUser.verified ? '<span class="verified-badge">✔</span>' : ''}${isAdm ? '<span class="admin-badge">ADMIN</span>' : ''}</h3>
      <p>Роль: ${currentUser.role === 'moderator' ? 'Администратор' : 'Игрок'}</p>
      <p>📝 Сообщений: ${posts.filter(p => p.authorId === currentUser.id).length}</p>
      <p>📅 Регистрация: ${currentUser.registered}</p>
      ${verifyButton}
      ${adminReportsButton}
      <button id="closeProfileBtn" style="background:#2a2350;border:none;padding:8px 24px;border-radius:40px;margin-top:16px;cursor:pointer;">Закрыть</button>
    `;
    document.getElementById("profileModal").classList.add("active");
    
    document.getElementById("closeProfileBtn")?.addEventListener("click", () => document.getElementById("profileModal").classList.remove("active"));
    document.getElementById("openVerifyBtnProfile")?.addEventListener("click", () => { document.getElementById("profileModal").classList.remove("active"); openVerifyModal(); });
    document.getElementById("adminReportsBtn")?.addEventListener("click", () => { document.getElementById("profileModal").classList.remove("active"); openAdminReports(); });
  }
  
  function openCreateTopicModal() {
    const select = document.getElementById("newTopicSectionSelect");
    select.innerHTML = sections.map(sec => `<option value="${sec.id}">${sec.icon} ${sec.name}</option>`).join("");
    document.getElementById("createTopicModal").classList.add("active");
  }
  
  function submitNewTopic() {
    const title = document.getElementById("newTopicTitle").value.trim();
    const sectionId = document.getElementById("newTopicSectionSelect").value;
    const content = document.getElementById("newTopicContent").value.trim();
    if (!title) { showToast("Введите название"); return; }
    
    const newTopic = { id: Date.now(), title, section: sectionId, authorId: currentUser.id, author: currentUser.nickname, postsCount: content ? 1 : 0, lastActivity: Date.now() };
    topics.push(newTopic);
    if (content) {
      posts.push({ id: Date.now(), topicId: newTopic.id, authorId: currentUser.id, author: currentUser.nickname, role: currentUser.role, content, likes: 0, timestamp: Date.now(), avatarColor: currentUser.avatarColor });
    }
    saveAll();
    document.getElementById("createTopicModal").classList.remove("active");
    renderMain();
    showToast(`Тема "${title}" создана!`);
  }
  
  function renderSectionNav() {
    const container = document.getElementById("sectionNav");
    container.innerHTML = sections.map(sec => `<button class="filter-chip ${currentSection === sec.id ? 'active' : ''}" data-section="${sec.id}">${sec.icon} ${sec.name}</button>`).join("");
    document.querySelectorAll("#sectionNav .filter-chip").forEach(btn => {
      btn.addEventListener("click", () => { currentSection = btn.dataset.section; renderMain(); renderSectionNav(); });
    });
  }
  
  function renderFilters() {
    const filters = ["new", "popular"];
    const names = { new: "🆕 Новые", popular: "🔥 Популярные" };
    const div = document.getElementById("filterGroup");
    div.innerHTML = filters.map(f => `<button class="filter-chip ${currentFilter === f ? 'active' : ''}" data-filter="${f}">${names[f]}</button>`).join("");
    document.querySelectorAll(".filter-chip").forEach(btn => {
      btn.addEventListener("click", () => { currentFilter = btn.dataset.filter; renderMain(); });
    });
  }
  
  function renderNav(activeView) {
    const navDiv = document.getElementById("navLinks");
    navDiv.innerHTML = `<button class="nav-btn ${activeView === 'forum' ? 'active' : ''}" data-view="forum">🏠 Форум</button>
                        <button class="nav-btn ${activeView === 'rules' ? 'active' : ''}" data-view="rules">📜 Правила</button>`;
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.dataset.view === "forum") { document.getElementById("mainView").style.display = "block"; document.getElementById("threadView").classList.add("hidden-view"); document.getElementById("rulesView").classList.add("hidden-view"); renderMain(); renderNav("forum"); }
        else { document.getElementById("mainView").style.display = "none"; document.getElementById("threadView").classList.add("hidden-view"); document.getElementById("rulesView").classList.remove("hidden-view"); renderNav("rules"); }
      });
    });
  }
  
  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
  
  initData();
  currentUser = getCurrentUser();
  if (!currentUser) { currentUser = users[0]; localStorage.setItem("ps_current_user", currentUser.id); }
  
  renderMain();
  renderSectionNav();
  renderFilters();
  renderNav("forum");
  updateMiniProfile();
  
  document.getElementById("createTopicBtn")?.addEventListener("click", openCreateTopicModal);
  document.getElementById("cancelTopicBtn")?.addEventListener("click", () => document.getElementById("createTopicModal").classList.remove("active"));
  document.getElementById("submitTopicBtn")?.addEventListener("click", submitNewTopic);
  document.getElementById("closeThreadBtn")?.addEventListener("click", () => { document.getElementById("mainView").style.display = "block"; document.getElementById("threadView").classList.add("hidden-view"); renderMain(); });
  document.getElementById("closeRulesBtn")?.addEventListener("click", () => { document.getElementById("mainView").style.display = "block"; document.getElementById("rulesView").classList.add("hidden-view"); renderMain(); });
  document.getElementById("profileMiniBtn")?.addEventListener("click", showProfileModal);
  document.getElementById("openReplyBtn")?.addEventListener("click", () => document.getElementById("replyArea").classList.toggle("open"));
  document.getElementById("sendMessageBtn")?.addEventListener("click", sendMessage);
  document.getElementById("cancelVerifyBtn")?.addEventListener("click", () => document.getElementById("verifyModal").classList.remove("active"));
  document.getElementById("submitVerifyBtn")?.addEventListener("click", submitVerifyRequest);
  document.getElementById("cancelReportBtn")?.addEventListener("click", () => document.getElementById("reportModal").classList.remove("active"));
  document.getElementById("closeReportsBtn")?.addEventListener("click", () => document.getElementById("adminReportsModal").classList.remove("active"));
  
  const rulesGrid = document.getElementById("rulesGrid");
  if (rulesGrid) rulesGrid.innerHTML = `<div class="rule-card"><div>🔹 Уважение</div><div>Не оскорбляй других</div></div><div class="rule-card"><div>🔹 Без спама</div><div>Не флуди</div></div>`;
</script>
</body>
</html>
